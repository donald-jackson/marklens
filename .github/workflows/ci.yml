name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: MarklensCore unit tests
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Run MarklensCore unit tests
        working-directory: MarklensCore
        run: |
          swift test --parallel

  build-macos:
    name: Build macOS
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch bundled web assets
        run: ./scripts/fetch-assets.sh

      - name: Generate Xcode project
        run: ./scripts/generate-project.sh

      - name: Build macOS app (Debug)
        run: |
          xcodebuild \
            -project Marklens.xcodeproj \
            -scheme Marklens \
            -destination 'platform=macOS' \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            | xcbeautify --renderer github-actions || \
          xcodebuild \
            -project Marklens.xcodeproj \
            -scheme Marklens \
            -destination 'platform=macOS' \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual

      # Release-config snapshot build of `main`, used to back the "attach
      # latest main build" step in release.yml — see that workflow for why
      # a fresh archive isn't built at release time. Ad-hoc signed (no
      # Developer ID cert in CI): fine as a reference snapshot, but not a
      # notarized artifact. Actual App Store submissions stay manual via
      # Xcode Organizer.
      - name: Build macOS app (Release snapshot for main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          xcodebuild \
            -project Marklens.xcodeproj \
            -scheme Marklens \
            -destination 'platform=macOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            build
          ditto -c -k --sequesterRsrc --keepParent \
            "build/Build/Products/Release/Marklens.app" \
            Marklens-macOS.zip

      - name: Upload macOS release snapshot
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: marklens-macos-release
          path: Marklens-macOS.zip
          retention-days: 90

  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Diagnose SDK/runtime build versions
        run: |
          echo "--- default Xcode.app ---"
          readlink -f /Applications/Xcode.app || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" /Applications/Xcode.app/Contents/Info.plist
          echo "--- iPhoneSimulator SDK build per installed Xcode ---"
          for app in /Applications/Xcode_1*.app /Applications/Xcode_2*.app; do
            plist="$app/Contents/Developer/Platforms/iPhoneSimulator.platform/version.plist"
            if [ -f "$plist" ]; then
              build=$(/usr/libexec/PlistBuddy -c "Print :ProductBuildVersion" "$plist")
              echo "$app -> iPhoneSimulator SDK build $build"
            fi
          done
          echo "--- installed runtimes ---"
          xcrun simctl list runtimes

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch bundled web assets
        run: ./scripts/fetch-assets.sh

      - name: Generate Xcode project
        run: ./scripts/generate-project.sh

      - name: Build iOS Simulator app
        run: |
          xcodebuild \
            -project Marklens.xcodeproj \
            -scheme Marklens \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
